version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: fido-wl-postgres
    environment:
      POSTGRES_DB: fido_wl_demo
      POSTGRES_USER: fido_user
      POSTGRES_PASSWORD: fido_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
